const answers = new Array(questions.length).fill(null); // 'correct' | 'wrong'

const progressTrack = document.getElementById('progressTrack');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const qMeta = document.getElementById('qMeta');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const explainBox = document.getElementById('explainBox');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');

function buildProgress(){
  progressTrack.innerHTML = '';
  questions.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    const h = 30 + (i / (questions.length - 1)) * 70;
    bar.style.height = h + '%';
    progressTrack.appendChild(bar);
  });
}

function refreshProgress(){
  const bars = progressTrack.children;
  for(let i=0;i<bars.length;i++){
    bars[i].classList.remove('current','correct','wrong');
    if(answers[i] === 'correct') bars[i].classList.add('correct');
    else if(answers[i] === 'wrong') bars[i].classList.add('wrong');
    else if(i === current) bars[i].classList.add('current');
  }
  progressText.textContent = `Soal ${current+1} dari ${questions.length}`;
  scoreText.textContent = `Skor: ${score}`;
}

function renderQuestion(){
  locked = false;
  const item = questions[current];
  qMeta.textContent = `Kegiatan Belajar ${item.kb}`;
  qText.textContent = item.q;
  optionsContainer.innerHTML = '';
  explainBox.classList.remove('show');
  explainBox.innerHTML = '';
  nextBtn.classList.remove('show');
  nextBtn.textContent = current === questions.length - 1 ? 'Lihat Hasil →' : 'Lanjut →';

  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="tag">${String.fromCharCode(65+idx)}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(idx, btn));
    optionsContainer.appendChild(btn);
  });

  refreshProgress();
}

function selectOption(idx, btnEl){
  if(locked) return;
  locked = true;
  const item = questions[current];
  const allBtns = optionsContainer.querySelectorAll('.option');
  allBtns.forEach(b => b.classList.add('locked'));

  if(idx === item.correct){
    btnEl.classList.add('correct');
    answers[current] = 'correct';
    score++;
  } else {
    btnEl.classList.add('wrong');
    allBtns[item.correct].classList.add('correct');
    answers[current] = 'wrong';
  }

  explainBox.innerHTML = `<strong>${idx === item.correct ? 'Benar.' : 'Kurang tepat.'}</strong> ${item.explain}`;
  explainBox.classList.add('show');
  nextBtn.classList.add('show');
  refreshProgress();
}

nextBtn.addEventListener('click', () => {
  if(current < questions.length - 1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult(){
  quizCard.style.display = 'none';
  resultCard.classList.add('show');

  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('finalPercent').textContent = `${pct}% jawaban benar`;

  let kb1 = 0, kb2 = 0;
  questions.forEach((q, i) => {
    if(answers[i] === 'correct'){
      if(q.kb === 1) kb1++; else kb2++;
    }
  });
  document.getElementById('kb1Score').textContent = `${kb1}/10`;
  document.getElementById('kb2Score').textContent = `${kb2}/10`;

  let title, desc;
  if(score >= 18){
    title = 'Wirausaha Visioner';
    desc = 'Pemahaman Anda terhadap tahapan memulai usaha digital dan design thinking sudah sangat solid. Siap lanjut ke Modul 5!';
  } else if(score >= 14){
    title = 'Inovator Potensial';
    desc = 'Pemahaman dasar sudah baik. Coba tinjau ulang soal yang terlewat sebelum melanjutkan ke modul berikutnya.';
  } else if(score >= 10){
    title = 'Perlu Penajaman Strategi';
    desc = 'Beberapa konsep kunci masih perlu diperkuat. Pertimbangkan untuk membaca ulang Kegiatan Belajar yang skornya lebih rendah.';
  } else {
    title = 'Mulai dari Dasar';
    desc = 'Disarankan membaca ulang Modul 4 secara menyeluruh sebelum mencoba kuis ini lagi.';
  }
  document.getElementById('verdictTitle').textContent = title;
  document.getElementById('verdictDesc').textContent = desc;
}

document.getElementById('retryBtn').addEventListener('click', () => {
  current = 0; score = 0; answers.fill(null);
  resultCard.classList.remove('show');
  quizCard.style.display = 'block';
  renderQuestion();
});

buildProgress();
renderQuestion();
</script>
</body>
</html>
