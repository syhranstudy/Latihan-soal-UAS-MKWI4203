<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Modul 7 — Kewirausahaan di Era Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14172B;
    --surface: #1C2046;
    --surface-2: #262B56;
    --accent-amber: #F2A93B;
    --accent-teal: #4FD1C5;
    --accent-coral: #FF6B6B;
    --text-primary: #F5F3EE;
    --text-muted: #9CA3C4;
    --border: rgba(245,243,238,0.10);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: radial-gradient(circle at 20% -10%, #232958 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 32px 16px 64px;
  }

  .app{ width:100%; max-width: 640px; }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-amber);
    font-weight: 600;
    margin: 0 0 6px;
  }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 700;
    margin: 0 0 18px;
    line-height: 1.25;
  }

  .progress-track{
    display:flex;
    align-items:flex-end;
    gap: 3px;
    height: 36px;
    margin-bottom: 8px;
  }
  .progress-bar{
    flex:1;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    transition: background .35s ease, transform .35s ease;
    transform-origin: bottom;
  }
  .progress-bar.current{ background: var(--accent-amber); }
  .progress-bar.correct{ background: var(--accent-teal); }
  .progress-bar.wrong{ background: var(--accent-coral); }

  .progress-label{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .progress-label span:last-child{ font-weight:600; color: var(--text-primary); }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .q-meta{
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .q-text{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 22px;
  }

  .options{ display:flex; flex-direction:column; gap: 10px; }

  .option{
    display:flex;
    align-items:flex-start;
    gap: 12px;
    text-align:left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .option:hover:not(.locked){ border-color: var(--accent-amber); transform: translateY(-1px); }
  .option:focus-visible{ outline: 2px solid var(--accent-amber); outline-offset: 2px; }

  .option .tag{
    flex-shrink:0;
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(245,243,238,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
  }

  .option.correct{ border-color: var(--accent-teal); background: rgba(79,209,197,0.12); }
  .option.correct .tag{ background: var(--accent-teal); color: #0B2421; }
  .option.wrong{ border-color: var(--accent-coral); background: rgba(255,107,107,0.10); }
  .option.wrong .tag{ background: var(--accent-coral); color: #2B0B0B; }
  .option.locked:not(.correct):not(.wrong){ opacity: 0.45; }

  .explain{
    margin-top: 18px;
    padding: 16px;
    border-radius: 14px;
    background: var(--surface-2);
    border-left: 3px solid var(--accent-amber);
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    display:none;
  }
  .explain.show{ display:block; }
  .explain strong{ color: var(--text-primary); }

  .next-btn{
    margin-top: 22px;
    width:100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: var(--accent-amber);
    color: #2B1B00;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor:pointer;
    display:none;
    transition: filter .2s ease;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ filter: brightness(1.08); }

  /* Result screen */
  .result{ display:none; text-align:center; }
  .result.show{ display:block; }
  .result .score-num{
    font-family:'Space Grotesk', sans-serif;
    font-size: 64px;
    font-weight: 700;
    margin: 6px 0 2px;
    background: linear-gradient(135deg, var(--accent-amber), var(--accent-teal));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result .score-sub{ color: var(--text-muted); font-size: 14px; margin-bottom: 18px; }
  .result .verdict{
    font-family:'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .result .verdict-desc{
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
    max-width: 440px;
    margin-left:auto; margin-right:auto;
  }
  .breakdown{
    display:flex; gap:12px; margin-bottom:24px;
  }
  .breakdown .b-item{
    flex:1; background: var(--surface-2); border-radius: 14px; padding: 14px;
    border: 1px solid var(--border);
  }
  .breakdown .b-num{ font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; }
  .breakdown .b-label{ font-size: 12px; color: var(--text-muted); margin-top:4px; }

  .retry-btn{
    padding: 14px 28px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor:pointer;
    transition: border-color .2s ease;
  }
  .retry-btn:hover{ border-color: var(--accent-amber); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>

      "Retention Rate (Tingkat Retensi/Pemeliharaan Pengguna)",
      "Bounce Rate (Tingkat Pentalan Halaman Web)",
      "Gross Profit Margin (Margin Laba Kotor)"
    ],
    correct: 1,
    explain: "Retention Rate mengukur berapa banyak pengguna yang kembali menggunakan produk setelah kunjungan pertama. Jika retensi rendah, berarti produk belum mencapai Product-Market Fit."
  },
  {
    kb: 2,
    q: "Pada tahap awal peluncuran (early traction), daripada memaksakan iklan berbayar (Ads) secara membabi-buta, wirausaha digital disarankan untuk berfokus membangun...",
    options: [
      "Komunitas pengguna organik (Community Building) dan pemasaran mulut ke mulut dari audiens yang fanatik",
      "Sistem birokrasi hierarki perusahaan yang tebal dan rumit",
      "Membeli pengikut (followers) bot palsu agar terlihat besar",
      "Pabrik-pabrik pencetak baliho reklame sendiri"
    ],
    correct: 0,
    explain: "Di tahap awal, dukungan dan pembelaan dari komunitas (advocate/early adopters) jauh lebih ampuh dan murah dibandingkan membakar uang untuk iklan berbayar yang belum tentu tepat sasaran."
  }
];

let current = 0;
let score = 0;
let locked = false;
const answers = new Array(questions.length).fill(null); 

const progressTrack = document.getElementById('progressTrack');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const qMeta = document.getElementById('qMeta');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const explainBox = document.getElementById('explainBox');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');

function buildProgress(){
  progressTrack.innerHTML = '';
  questions.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    const h = 30 + (i / (questions.length - 1)) * 70;
    bar.style.height = h + '%';
    progressTrack.appendChild(bar);
  });
}

function refreshProgress(){
  const bars = progressTrack.children;
  for(let i=0;i<bars.length;i++){
    bars[i].classList.remove('current','correct','wrong');
    if(answers[i] === 'correct') bars[i].classList.add('correct');
    else if(answers[i] === 'wrong') bars[i].classList.add('wrong');
    else if(i === current) bars[i].classList.add('current');
  }
  progressText.textContent = `Soal ${current+1} dari ${questions.length}`;
  scoreText.textContent = `Skor: ${score}`;
}

function renderQuestion(){
  locked = false;
  const item = questions[current];
  qMeta.textContent = `Kegiatan Belajar ${item.kb}`;
  qText.textContent = item.q;
  optionsContainer.innerHTML = '';
  explainBox.classList.remove('show');
  explainBox.innerHTML = '';
  nextBtn.classList.remove('show');
  nextBtn.textContent = current === questions.length - 1 ? 'Lihat Hasil →' : 'Lanjut →';

  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="tag">${String.fromCharCode(65+idx)}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(idx, btn));
    optionsContainer.appendChild(btn);
  });

  refreshProgress();
}

function selectOption(idx, btnEl){
  if(locked) return;
  locked = true;
  const item = questions[current];
  const allBtns = optionsContainer.querySelectorAll('.option');
  allBtns.forEach(b => b.classList.add('locked'));

  if(idx === item.correct){
    btnEl.classList.add('correct');
    answers[current] = 'correct';
    score++;
  } else {
    btnEl.classList.add('wrong');
    allBtns[item.correct].classList.add('correct');
    answers[current] = 'wrong';
  }

  explainBox.innerHTML = `<strong>${idx === item.correct ? 'Benar.' : 'Kurang tepat.'}</strong> ${item.explain}`;
  explainBox.classList.add('show');
  nextBtn.classList.add('show');
  refreshProgress();
}

nextBtn.addEventListener('click', () => {
  if(current < questions.length - 1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult(){
  quizCard.style.display = 'none';
  resultCard.classList.add('show');

  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('finalPercent').textContent = `${pct}% jawaban benar`;

  let kb1 = 0, kb2 = 0;
  questions.forEach((q, i) => {
    if(answers[i] === 'correct'){
      if(q.kb === 1) kb1++; else kb2++;
    }
  });
  document.getElementById('kb1Score').textContent = `${kb1}/10`;
  document.getElementById('kb2Score').textContent = `${kb2}/10`;

  let title, desc;
  if(score >= 18){
    title = 'Inovator Samudra Biru';
    desc = 'Luar biasa! Pemahaman Anda terkait strategi menembus pasar baru (BOS) dan manuver Lean Startup sudah sangat mapan.';
  } else if(score >= 14){
    title = 'Perintis Tangkas (Agile)';
    desc = 'Bagus! Anda mengerti cara menghindari kompetisi berdarah dan memahami esensi dari Minimum Viable Product (MVP).';
  } else if(score >= 10){
    title = 'Awas Jebakan Red Ocean';
    desc = 'Waspada, beberapa logika Anda masih terperangkap di Samudra Merah. Coba perdalam lagi perbedaan MVP dan produk final.';
  } else {
    title = 'Perlu Revisi Strategi';
    desc = 'Jangan buru-buru peluncuran! Mari baca kembali siklus "Build-Measure-Learn" dan kerangka ERRC sebelum mencoba lagi.';
  }
  document.getElementById('verdictTitle').textContent = title;
  document.getElementById('verdictDesc').textContent = desc;
}

document.getElementById('retryBtn').addEventListener('click', () => {
  current = 0; score = 0; answers.fill(null);
  resultCard.classList.remove('show');
  quizCard.style.display = 'block';
  renderQuestion();
});

buildProgress();
renderQuestion();
</script>
</body>
</html>
