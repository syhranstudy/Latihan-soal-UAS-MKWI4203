<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Modul 6 — Kewirausahaan di Era Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg: #14172B;
    --surface: #1C2046;
    --surface-2: #262B56;
    --accent-amber: #F2A93B;
    --accent-teal: #4FD1C5;
    --accent-coral: #FF6B6B;
    --text-primary: #F5F3EE;
    --text-muted: #9CA3C4;
    --border: rgba(245,243,238,0.10);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: radial-gradient(circle at 20% -10%, #232958 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 32px 16px 64px;
  }

  .app{ width:100%; max-width: 640px; }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-amber);
    font-weight: 600;
    margin: 0 0 6px;
  }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 700;
    margin: 0 0 18px;
    line-height: 1.25;
  }

  .progress-track{
    display:flex;
    align-items:flex-end;
    gap: 3px;
    height: 36px;
    margin-bottom: 8px;
  }
  .progress-bar{
    flex:1;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    transition: background .35s ease, transform .35s ease;
    transform-origin: bottom;
  }
  .progress-bar.current{ background: var(--accent-amber); }
  .progress-bar.correct{ background: var(--accent-teal); }
  .progress-bar.wrong{ background: var(--accent-coral); }

  .progress-label{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .progress-label span:last-child{ font-weight:600; color: var(--text-primary); }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .q-meta{
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .q-text{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 22px;
  }

  .options{ display:flex; flex-direction:column; gap: 10px; }

  .option{
    display:flex;
    align-items:flex-start;
    gap: 12px;
    text-align:left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .option:hover:not(.locked){ border-color: var(--accent-amber); transform: translateY(-1px); }
  .option:focus-visible{ outline: 2px solid var(--accent-amber); outline-offset: 2px; }

  .option .tag{
    flex-shrink:0;
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(245,243,238,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
  }

  .option.correct{ border-color: var(--accent-teal); background: rgba(79,209,197,0.12); }
  .option.correct .tag{ background: var(--accent-teal); color: #0B2421; }
  .option.wrong{ border-color: var(--accent-coral); background: rgba(255,107,107,0.10); }
  .option.wrong .tag{ background: var(--accent-coral); color: #2B0B0B; }
  .option.locked:not(.correct):not(.wrong){ opacity: 0.45; }

  .explain{
    margin-top: 18px;
    padding: 16px;
    border-radius: 14px;
    background: var(--surface-2);
    border-left: 3px solid var(--accent-amber);
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    display:none;
  }
  .explain.show{ display:block; }
  .explain strong{ color: var(--text-primary); }

  .next-btn{
    margin-top: 22px;
    width:100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: var(--accent-amber);
    color: #2B1B00;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor:pointer;
    display:none;
    transition: filter .2s ease;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ filter: brightness(1.08); }

  /* Result screen */
  .result{ display:none; text-align:center; }
  .result.show{ display:block; }
  .result .score-num{
    font-family:'Space Grotesk', sans-serif;
    font-size: 64px;
    font-weight: 700;
    margin: 6px 0 2px;
    background: linear-gradient(135deg, var(--accent-amber), var(--accent-teal));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result .score-sub{ color: var(--text-muted); font-size: 14px; margin-bottom: 18px; }
  .result .verdict{
    font-family:'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .result .verdict-desc{
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
    max-width: 440px;
    margin-left:auto; margin-right:auto;
  }
  .breakdown{
    display:flex; gap:12px; margin-bottom:24px;
  }
  .breakdown .b-item{
    flex:1; background: var(--surface-2); border-radius: 14px; padding: 14px;
    border: 1px solid var(--border);
  }
  .breakdown .b-num{ font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; }
  .breakdown .b-label{ font-size: 12px; color: var(--text-muted); margin-top:4px; }

  .retry-btn{
    padding: 14px 28px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor:pointer;
    transition: border-color .2s ease;
  }
  .retry-btn:hover{ border-color: var(--accent-amber); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>

<div class="app">
  <p class="eyebrow">MKWI4203 · Kewirausahaan di Era Digital</p>

<script>
const questions = [
  // ===== KB1: Konsep Dasar & Business Model Canvas (1-10) =====
  {
    kb: 1,
    q: "Secara konseptual, apa yang dimaksud dengan 'Model Bisnis' (Business Model)?",
    options: [
      "Sebuah dokumen legal yang berisi rincian modal dan kepemilikan saham perusahaan",
      "Gambaran rasional tentang bagaimana sebuah organisasi menciptakan, memberikan, dan menangkap nilai (value) secara ekonomi",
      "Strategi periklanan yang dibuat oleh divisi pemasaran",
      "Daftar kompetitor yang harus dikalahkan di pasar global"
    ],
    correct: 1,
    explain: "Model bisnis pada dasarnya adalah cetak biru (blueprint) mengenai bagaimana perusahaan menghasilkan uang dengan cara memberikan nilai tambah kepada pelanggannya."
  },
  {
    kb: 1,
    q: "Dalam Business Model Canvas (BMC), blok yang mendeskripsikan kelompok orang atau organisasi spesifik yang ingin dijangkau dan dilayani adalah...",
    options: [
      "Value Propositions",
      "Channels",
      "Customer Segments (Segmen Pelanggan)",
      "Key Partners"
    ],
    correct: 2,
    explain: "Customer Segments adalah blok fondasi pertama dalam BMC. Tanpa pelanggan yang jelas dan spesifik (menguntungkan), tidak ada bisnis yang bisa bertahan hidup."
  },
  {
    kb: 1,
    q: "Apa fungsi utama dari blok 'Value Proposition' (Proposisi Nilai) di dalam Business Model Canvas?",
    options: [
      "Menguraikan aset-aset berwujud milik perusahaan",
      "Menjelaskan produk atau layanan unik yang menciptakan nilai tambah dan memecahkan masalah pelanggan spesifik",
      "Menentukan harga jual barang termurah di pasaran",
      "Memetakan saluran distribusi logistik"
    ],
    correct: 1,
    explain: "Value proposition adalah alasan mengapa pelanggan memilih perusahaan Anda daripada kompetitor; produk/jasa tersebut harus bisa menyelesaikan masalah atau memenuhi kebutuhan (pain/gain) pelanggan."
  },
  {
    kb: 1,
    q: "Perbedaan mendasar antara model bisnis konvensional (Pipeline/Linier) dengan model bisnis digital berbasis Platform adalah...",

      "Pipeline memfasilitasi pertukaran antar pengguna, sedangkan platform membuat barang sendiri di pabrik",
      "Pipeline hanya menggunakan internet lambat, platform menggunakan internet cepat",
      "Pipeline menciptakan aliran nilai secara linier dari produsen ke konsumen, sedangkan platform bertindak sebagai fasilitator yang mempertemukan pihak yang saling membutuhkan",
      "Pipeline tidak membutuhkan pelanggan, platform sangat bergantung pada pelanggan"
    ],

    explain: "Bisnis pipeline (seperti pabrik sepatu) memproduksi lalu menjual barang di ujung rantai. Platform (seperti Tokopedia/Airbnb) tidak memproduksi barang, melainkan menciptakan nilai dengan menghubungkan penjual dan pembeli."
  },
  {
    kb: 1,
    q: "Blok 'Revenue Streams' dalam BMC berfungsi untuk menjelaskan tentang...",
    options: [
      "Urusan perizinan dan pajak perusahaan",
      "Biaya pengeluaran bulanan operasional",
      "Alur kas (cash flow) yang menunjukkan bagaimana perusahaan menghasilkan uang dari setiap segmen pelanggan",
      "Strategi merekrut pegawai baru"
    ],
    correct: 2,
    explain: "Revenue Streams (Arus Pendapatan) adalah urat nadi bisnis. Ini menjelaskan mekanisme bagaimana uang masuk (misal: penjualan langsung, biaya langganan, lisensi, sewa)."
  },
  {
    kb: 1,
    q: "Alasan mendasar mengapa perusahaan di era digital dituntut untuk terus mengevaluasi dan melakukan 'Inovasi Model Bisnis' adalah...",
    options: [
      "Karena siklus hidup produk semakin pendek dan preferensi konsumen sangat cepat berubah akibat disrupsi teknologi",
      "Karena pemerintah mewajibkan perubahan nama perusahaan setiap lima tahun",
      "Karena karyawan akan cepat bosan jika model bisnisnya tetap",
      "Karena perusahaan ingin menurunkan kualitas layanannya"
    ],
    correct: 0,
    explain: "Di era VUCA (cepat berubah dan disrupsi), model bisnis yang sukses hari ini bisa usang besok. Inovasi model bisnis diperlukan agar perusahaan tetap relevan dengan zaman."
  },
  {
    kb: 1,
    q: "Dalam perusahaan digital murni (seperti Google atau Meta), komponen 'Key Resources' (Sumber Daya Utama) biasanya bergeser dari dominasi aset fisik menjadi dominasi...",
    options: [
      "Mesin perakitan mekanis berat",
      "Armada logistik truk yang besar",
      "Gedung pabrik dan gudang penyimpanan tanah",
      "Aset intelektual, kekuatan algoritma, dan penguasaan big data"

  },
  {
    kb: 1,
    q: "Blok 'Channels' (Saluran) pada Business Model Canvas menjelaskan tentang bagaimana perusahaan...",

      "Berkomunikasi (promosi), mendistribusikan, dan menjual proposisi nilainya agar sampai ke tangan segmen pelanggan",
      "Mencari mitra pasokan bahan baku (supplier)",
      "Menentukan tingkat gaji pegawai"
    ],
    correct: 1,
    explain: "Saluran adalah titik sentuh (touchpoints) yang memainkan peran penting dalam pengalaman pelanggan. Contoh: website, aplikasi, toko fisik, agen penjualan."
  },
  {
    kb: 1,
    q: "Di era bisnis digital, blok 'Customer Relationships' (Hubungan Pelanggan) seringkali diotomatisasi. Contoh paling tepat dari penerapan ini adalah...",
    options: [
      "Manajer yang harus menemui pelanggan satu per satu secara langsung",
      "Penggunaan agen manusia untuk menelpon pelanggan (cold calling)",
      "Pemanfaatan Chatbot berbasis AI untuk melayani pertanyaan dasar atau keluhan pelanggan selama 24/7",
      "Mengirim brosur via pos surat konvensional"
    ],
    correct: 2,
    explain: "Hubungan pelanggan otomasi digital (seperti Chatbot AI) memungkinkan perusahaan melayani ribuan pelanggan secara bersamaan, instan, efisien biaya, dan tanpa batas waktu operasional."
  },
  {
    kb: 1,
    q: "Pergeseran paradigma yang paling nyata dalam model bisnis digital adalah transisi dari model 'Kepemilikan' (Ownership) menjadi model 'Akses' (Access). Contohnya adalah...",
    options: [
      "Konsumen lebih memilih membeli DVD film fisik agar bisa dikoleksi di lemari",
      "Konsumen tidak lagi membeli lagu dalam bentuk kaset/CD, melainkan berlangganan akses ke puluhan juta lagu melalui Spotify",
      "Perusahaan wajib memiliki sendiri ribuan server fisik di kantor pusat",
      "Pembeli menuntut sertifikat kepemilikan mutlak atas semua software yang digunakan"

    correct: 1,
    explain: "Konsumen modern lebih mementingkan manfaat dari 'mengakses' suatu nilai tanpa direpotkan beban perawatan 'memiliki' aset fisiknya (seperti model layanan streaming Netflix/Spotify)."
  },

  // ===== KB2: Jenis-jenis Model Bisnis Digital (11-20) =====
  {
    kb: 2,
    q: "Spotify dan Zoom menawarkan akses layanan dasar secara cuma-cuma, namun pelanggan wajib membayar (upgrade) jika ingin menikmati fitur lanjutan atau menghilangkan iklan. Model bisnis ini disebut...",
    options: [
      "E-Commerce Retail",
      "Freemium (Free + Premium)",
      "Dropshipping",
      "On-Demand Services"
    ],

    explain: "Freemium merupakan gabungan 'Free' dan 'Premium'. Versi gratis berfungsi sebagai magnet untuk mengakuisisi pengguna sebanyak-banyaknya, sebelum mengonversi sebagian pengguna tersebut menjadi pelanggan berbayar."
  },
  {
    kb: 2,
    q: "Platform video seperti Netflix dan perangkat lunak Microsoft 365 menggunakan model bisnis...",
    options: [
      "Bait and Hook",
      "Crowdfunding",
      "Subscription (Berlangganan)",
      "Affiliate Marketing"
    ],
    correct: 2,
    explain: "Dalam model Subscription, pengguna membayar biaya berlangganan tetap (bulanan/tahunan) untuk mempertahankan akses ke produk/jasa. Model ini menjamin pendapatan berulang (recurring revenue) bagi perusahaan."
  },
  {
    kb: 2,
    q: "Model bisnis rantai pasok digital yang memungkinkan wirausaha menjual barang tanpa perlu menyetok inventaris, memproduksi barang, atau mengemas pengiriman secara fisik disebut...",

      "Social Commerce",
      "Multi-sided Platform"

  },
  {
    kb: 2,
    q: "Perusahaan penyedia aplikasi mobilitas seperti Gojek atau Grab sangat identik dengan model bisnis...",

      "Freemium"

    correct: 2,

  },
  {
    kb: 2,

  },
  {
    kb: 2,

  },
  {

  },
  {

      "Menghubungkan secara langsung individu/UMKM yang membutuhkan pinjaman (Borrower) dengan individu/institusi yang bersedia memberikan dana pinjaman (Lender)",
      "Mencetak uang elektronik yang diatur oleh Bank Indonesia",
      "Menyita aset properti nasabah yang gagal bayar tanpa prosedur hukum"
    ],
    correct: 1,
    explain: "Platform P2P Lending hanya bertindak sebagai makelar fasilitator (marketplace uang). Mereka melakukan penilaian kredit (credit scoring) lalu mempertemukan peminjam dengan pendana tanpa harus melewati bank konvensional."
  }
];

let current = 0;
let score = 0;
let locked = false;
const answers = new Array(questions.length).fill(null); 

const progressTrack = document.getElementById('progressTrack');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const qMeta = document.getElementById('qMeta');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const explainBox = document.getElementById('explainBox');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');

function buildProgress(){
  progressTrack.innerHTML = '';
  questions.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    const h = 30 + (i / (questions.length - 1)) * 70;
    bar.style.height = h + '%';
    progressTrack.appendChild(bar);
  });
}

function refreshProgress(){
  const bars = progressTrack.children;
  for(let i=0;i<bars.length;i++){
    bars[i].classList.remove('current','correct','wrong');
    if(answers[i] === 'correct') bars[i].classList.add('correct');
    else if(answers[i] === 'wrong') bars[i].classList.add('wrong');
    else if(i === current) bars[i].classList.add('current');
  }
  progressText.textContent = `Soal ${current+1} dari ${questions.length}`;
  scoreText.textContent = `Skor: ${score}`;
}

function renderQuestion(){
  locked = false;
  const item = questions[current];
  qMeta.textContent = `Kegiatan Belajar ${item.kb}`;
  qText.textContent = item.q;
  optionsContainer.innerHTML = '';
  explainBox.classList.remove('show');
  explainBox.innerHTML = '';
  nextBtn.classList.remove('show');
  nextBtn.textContent = current === questions.length - 1 ? 'Lihat Hasil →' : 'Lanjut →';

  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="tag">${String.fromCharCode(65+idx)}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(idx, btn));
    optionsContainer.appendChild(btn);
  });

  refreshProgress();
}

function selectOption(idx, btnEl){
  if(locked) return;
  locked = true;
  const item = questions[current];
  const allBtns = optionsContainer.querySelectorAll('.option');
  allBtns.forEach(b => b.classList.add('locked'));

  if(idx === item.correct){
    btnEl.classList.add('correct');
    answers[current] = 'correct';
    score++;
  } else {
    btnEl.classList.add('wrong');
    allBtns[item.correct].classList.add('correct');
    answers[current] = 'wrong';
  }

  explainBox.innerHTML = `<strong>${idx === item.correct ? 'Benar.' : 'Kurang tepat.'}</strong> ${item.explain}`;
  explainBox.classList.add('show');
  nextBtn.classList.add('show');
  refreshProgress();
}

nextBtn.addEventListener('click', () => {
  if(current < questions.length - 1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult(){
  quizCard.style.display = 'none';
  resultCard.classList.add('show');

  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('finalPercent').textContent = `${pct}% jawaban benar`;

  let kb1 = 0, kb2 = 0;
  questions.forEach((q, i) => {
    if(answers[i] === 'correct'){
      if(q.kb === 1) kb1++; else kb2++;
    }
  });
  document.getElementById('kb1Score').textContent = `${kb1}/10`;
  document.getElementById('kb2Score').textContent = `${kb2}/10`;

  let title, desc;
  if(score >= 18){
    title = 'Master Model Bisnis';
    desc = 'Pemahaman Anda soal Business Model Canvas (BMC) dan variasi model bisnis digital sudah setingkat CEO Startup. Hebat!';
  } else if(score >= 14){
    title = 'Konsultan Strategi Menengah';
    desc = 'Bagus! Anda sudah menangkap pola pergeseran cara bisnis menghasilkan uang di era digital. Sedikit lagi menuju sempurna.';
  } else if(score >= 10){
    title = 'Perlu Revisi Canvas';
    desc = 'Anda masih tertukar antara beberapa konsep dasar BMC dan istilah model bisnis spesifik. Coba review lagi teori Freemium dan Subscription.';
  } else {
    title = 'Kembali ke Papan Tulis';
    desc = 'Jangan patah semangat! Mari kita buka kembali Modul 6 dan pahami 9 blok bangunan utama Business Model Canvas dari awal.';
  }
  document.getElementById('verdictTitle').textContent = title;
  document.getElementById('verdictDesc').textContent = desc;
}

document.getElementById('retryBtn').addEventListener('click', () => {
  current = 0; score = 0; answers.fill(null);
  resultCard.classList.remove('show');
  quizCard.style.display = 'block';
  renderQuestion();
});

buildProgress();
renderQuestion();
</script>
</body>
</html>
