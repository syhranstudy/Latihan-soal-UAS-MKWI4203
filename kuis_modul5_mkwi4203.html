<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Modul 5 — Kewirausahaan di Era Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14172B;
    --surface: #1C2046;
    --surface-2: #262B56;
    --accent-amber: #F2A93B;
    --accent-teal: #4FD1C5;
    --accent-coral: #FF6B6B;
    --text-primary: #F5F3EE;
    --text-muted: #9CA3C4;
    --border: rgba(245,243,238,0.10);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: radial-gradient(circle at 20% -10%, #232958 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 32px 16px 64px;
  }

  .app{ width:100%; max-width: 640px; }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-amber);
    font-weight: 600;
    margin: 0 0 6px;
  }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 700;
    margin: 0 0 18px;
    line-height: 1.25;
  }

  .progress-track{
    display:flex;
    align-items:flex-end;
    gap: 3px;
    height: 36px;
    margin-bottom: 8px;
  }
  .progress-bar{
    flex:1;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    transition: background .35s ease, transform .35s ease;
    transform-origin: bottom;
  }
  .progress-bar.current{ background: var(--accent-amber); }
  .progress-bar.correct{ background: var(--accent-teal); }
  .progress-bar.wrong{ background: var(--accent-coral); }

  .progress-label{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .progress-label span:last-child{ font-weight:600; color: var(--text-primary); }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .q-meta{
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .q-text{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 22px;
  }

  .options{ display:flex; flex-direction:column; gap: 10px; }

  .option{
    display:flex;
    align-items:flex-start;
    gap: 12px;
    text-align:left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .option:hover:not(.locked){ border-color: var(--accent-amber); transform: translateY(-1px); }
  .option:focus-visible{ outline: 2px solid var(--accent-amber); outline-offset: 2px; }

  .option .tag{
    flex-shrink:0;
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(245,243,238,0.08);
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
  }

  .option.correct{ border-color: var(--accent-teal); background: rgba(79,209,197,0.12); }
  .option.correct .tag{ background: var(--accent-teal); color: #0B2421; }
  .option.wrong{ border-color: var(--accent-coral); background: rgba(255,107,107,0.10); }
  .option.wrong .tag{ background: var(--accent-coral); color: #2B0B0B; }
  .option.locked:not(.correct):not(.wrong){ opacity: 0.45; }

  .explain{
    margin-top: 18px;
    padding: 16px;
    border-radius: 14px;
    background: var(--surface-2);
    border-left: 3px solid var(--accent-amber);
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    display:none;
  }
  .explain.show{ display:block; }
  .explain strong{ color: var(--text-primary); }

  .next-btn{
    margin-top: 22px;
    width:100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: var(--accent-amber);
    color: #2B1B00;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor:pointer;
    display:none;
    transition: filter .2s ease;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ filter: brightness(1.08); }

  /* Result screen */
  .result{ display:none; text-align:center; }
  .result.show{ display:block; }
  .result .score-num{
    font-family:'Space Grotesk', sans-serif;
    font-size: 64px;
    font-weight: 700;
    margin: 6px 0 2px;
    background: linear-gradient(135deg, var(--accent-amber), var(--accent-teal));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result .score-sub{ color: var(--text-muted); font-size: 14px; margin-bottom: 18px; }
  .result .verdict{
    font-family:'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .result .verdict-desc{
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
    max-width: 440px;
    margin-left:auto; margin-right:auto;
  }
  .breakdown{
    display:flex; gap:12px; margin-bottom:24px;
  }
  .breakdown .b-item{
    flex:1; background: var(--surface-2); border-radius: 14px; padding: 14px;
    border: 1px solid var(--border);
  }
  .breakdown .b-num{ font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; }
  .breakdown .b-label{ font-size: 12px; color: var(--text-muted); margin-top:4px; }

  .retry-btn{
    padding: 14px 28px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor:pointer;
    transition: border-color .2s ease;
  }
  .retry-btn:hover{ border-color: var(--accent-amber); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>

    q: "Dalam perilaku belanja modern, fenomena di mana pelanggan melihat-lihat barang secara fisik di toko, namun akhirnya membeli secara online untuk mendapat harga lebih murah disebut...",
    options: [
      "Webrooming",

      "Showrooming",
      "Crowdsourcing"
    ],
    correct: 2,
    explain: "Showrooming menjadikan toko fisik sekadar 'ruang pamer' (showroom), sementara transaksi eksekusinya dilakukan di platform e-commerce demi harga yang lebih kompetitif."
  },
  {
    kb: 1,
    q: "Kebalikan dari Showrooming, fenomena di mana pelanggan meriset spesifikasi produk di internet lalu membelinya secara langsung di toko fisik disebut...",
    options: [
      "Webrooming",
      "Retargeting",
      "Phishing",
      "Social Commerce"
    ],
    correct: 0,
    explain: "Webrooming terjadi ketika pelanggan mencari ulasan dan membandingkan harga di internet (web), lalu pergi ke toko fisik untuk membeli barang agar bisa langsung dibawa pulang."
  },
  {
    kb: 1,
    q: "Konsep 'Zero Moment of Truth' (ZMOT) yang digagas oleh Google merujuk pada tahap ketika konsumen...",
    options: [
      "Membuka kemasan produk untuk pertama kalinya",
      "Melakukan riset online secara mandiri sebelum berinteraksi langsung dengan merek",
      "Membuang produk yang sudah tidak terpakai",
      "Melakukan komplain kepada layanan pelanggan (customer service)"
    ],
    correct: 1,
    explain: "ZMOT adalah momen kritis di mana konsumen mencari ulasan, membaca blog, atau menonton video YouTube tentang sebuah produk *sebelum* mereka benar-benar pergi ke toko atau mengklik tombol beli."
  },
  {
    kb: 1,
    q: "Peran 'Social Proof' (Bukti Sosial) sangat krusial bagi konsumen digital. Contoh paling umum dari Social Proof adalah...",
    options: [
      "Iklan baliho raksasa di jalan tol",
      "Ulasan (rating/review) dari pembeli lain di kolom komentar e-commerce",
      "Sertifikat pendaftaran perusahaan dari kementerian",
      "Diskon potongan harga akhir tahun"
    ],
    correct: 1,
    explain: "Konsumen digital lebih memercayai opini, rating, dan ulasan sesama pengguna (user-generated content) dibandingkan dengan klaim iklan dari perusahaan itu sendiri."
  },
  {
    kb: 1,
    q: "Mengapa tingkat 'Loyalitas Merek' (Brand Loyalty) pada konsumen digital cenderung lebih rendah dibandingkan konsumen era masa lalu?",
    options: [
      "Karena tidak ada produk yang berkualitas di era digital",
      "Karena konsumen dibatasi haknya oleh pemerintah untuk berpindah merek",
      "Karena banyaknya opsi substitusi (pengganti) dan mudahnya membandingkan penawaran antar kompetitor hanya dengan sekali klik",
      "Karena merek digital tidak pernah memberikan diskon"
    ],
    correct: 2,
    explain: "Dengan biaya peralihan (switching cost) yang hampir nol dan akses ke ribuan pilihan di internet, konsumen digital tidak ragu untuk berpindah merek jika menemukan nilai yang lebih baik di tempat lain."
  },
  {
    kb: 1,
    q: "Istilah 'Prosumer' muncul di era digital untuk menggambarkan konsumen yang...",
    options: [
      "Hanya membeli produk impor berharga premium",
      "Bersikap pasif dan menerima produk apa adanya",
      "Berperan ganda sebagai konsumen (consumer) sekaligus ikut berpartisipasi/memproduksi (producer) ide, ulasan, atau konten produk",

    ],
    correct: 2,
    explain: "Prosumer (Producer + Consumer) adalah konsumen aktif yang tidak hanya membeli, tetapi ikut menyumbang gagasan produk baru, membuat video unboxing, atau merekomendasikan produk."
  },
  {
    kb: 1,
    q: "Tingginya paparan informasi di media sosial kerap memicu kecemasan psikologis pada konsumen digital apabila mereka tertinggal tren. Fenomena ini disebut...",
    options: [
      "VUCA (Volatility, Uncertainty, Complexity, Ambiguity)",
      "FOMO (Fear Of Missing Out)",
      "JOMO (Joy Of Missing Out)",
      "B2B (Business to Business)"
    ],
    correct: 1,
    explain: "FOMO sering dieksploitasi oleh pemasar digital melalui taktik seperti 'Flash Sale' atau 'Stok Terbatas' karena konsumen takut kehilangan kesempatan atau tertinggal tren."
  },
  {
    kb: 1,
    q: "Salah satu tuntutan paling dominan dari konsumen digital terhadap sebuah merek adalah 'Personalisasi'. Maksudnya adalah...",
    options: [
      "Konsumen ingin seluruh identitas pribadinya disebar luaskan di internet",
      "Perusahaan hanya memproduksi satu jenis barang untuk semua orang secara global",
      "Konsumen mengharapkan pengalaman, rekomendasi, dan penawaran yang relevan dengan kebiasaan dan preferensi spesifik mereka",
      "Konsumen menuntut merek untuk membagikan saham perusahaannya kepada mereka"
    ],
    correct: 2,
    explain: "Personalisasi berarti merek mampu 'mengenali' konsumen lewat data analitik (misalnya: algoritma rekomendasi Netflix atau Spotify) sehingga pengalaman berbelanja terasa khusus untuk individu tersebut."
  },
  {
    kb: 1,
    q: "Faktor yang paling cepat menghancurkan reputasi merek di mata konsumen digital, yang efeknya bisa menyebar dalam hitungan jam, adalah...",
    options: [
      "Mengganti logo perusahaan",
      "Buruknya pelayanan pelanggan yang diviralkan melalui tangkapan layar (screenshot) di media sosial",

      "Mengubah kemasan produk menjadi ramah lingkungan"
    ],
    correct: 1,
    explain: "Era media sosial memberi kekuatan pada konsumen untuk memviralkan pengalaman buruk. Satu keluhan viral dapat dengan cepat meruntuhkan kepercayaan ratusan ribu calon pembeli lainnya."
  },

  // ===== KB2: Strategi Pendekatan Konsumen (11-20) =====
  {

    options: [

      "Aware, Analyze, Acquire, Adapt, Abandon",
      "Attention, Action, Attitude, Activity, Advance",
      "Assess, Accept, Act, Align, Authorize"
    ],
    correct: 0,
    explain: "5A Customer Path Kotler adalah: Aware (Sadar), Appeal (Tertarik), Ask (Mencari tahu), Act (Bertindak/Beli), dan Advocate (Menganjurkan)."
  },
  {
    kb: 2,
    q: "Dalam model 5A, tahap di mana calon pembeli mulai mencari ulasan online, menelepon call center, atau bertanya kepada teman terkait suatu merek berada pada fase...",
    options: [
      "Aware",
      "Act",
      "Ask",
      "Advocate"
    ],
    correct: 2,
    explain: "Fase 'Ask' terjadi ketika konsumen yang sudah tertarik (Appeal) melakukan riset mendalam dan memvalidasi ketertarikannya melalui berbagai saluran pencarian informasi."
  },
  {
    kb: 2,
    q: "Fase tertinggi dan paling diharapkan oleh wirausaha dalam 5A Customer Path adalah 'Advocate', di mana pelanggan...",
    options: [
      "Membeli produk untuk pertama kalinya",
      "Melihat iklan produk di televisi",
      "Membatalkan pesanannya karena kecewa",
      "Menjadi pembela merek yang secara sukarela merekomendasikan produk tersebut kepada jejaringnya"
    ],
    correct: 3,
    explain: "Advocate adalah puncak loyalitas. Pelanggan tidak hanya setia, tetapi bertindak sebagai tenaga pemasar gratis dengan merekomendasikan merek dari mulut ke mulut."
  },
  {
    kb: 2,
    q: "Strategi pemasaran yang memberikan pengalaman berbelanja yang mulus (seamless) dan terintegrasi penuh di berbagai titik sentuh (toko fisik, website, aplikasi) disebut strategi...",

      "Multichannel",
      "Omnichannel",

  },
  {
    kb: 2,

    correct: 2,
    explain: "Multichannel menggunakan banyak saluran namun sistemnya tidak saling bicara. Omnichannel menyatukan semua saluran itu menjadi satu ekosistem pengalaman pelanggan yang utuh."
  },
  {
    kb: 2,

  },

  },
  {
    kb: 2,
    q: "Implementasi perangkat lunak Customer Relationship Management (CRM) sangat vital untuk memahami konsumen karena...",

let current = 0;
let score = 0;

const answers = new Array(questions.length).fill(null); 

const progressTrack = document.getElementById('progressTrack');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const qMeta = document.getElementById('qMeta');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const explainBox = document.getElementById('explainBox');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');

function buildProgress(){
  progressTrack.innerHTML = '';
  questions.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    const h = 30 + (i / (questions.length - 1)) * 70;
    bar.style.height = h + '%';
    progressTrack.appendChild(bar);
  });
}

function refreshProgress(){
  const bars = progressTrack.children;
  for(let i=0;i<bars.length;i++){
    bars[i].classList.remove('current','correct','wrong');
    if(answers[i] === 'correct') bars[i].classList.add('correct');
    else if(answers[i] === 'wrong') bars[i].classList.add('wrong');
    else if(i === current) bars[i].classList.add('current');
  }
  progressText.textContent = `Soal ${current+1} dari ${questions.length}`;
  scoreText.textContent = `Skor: ${score}`;
}

function renderQuestion(){
  locked = false;
  const item = questions[current];
  qMeta.textContent = `Kegiatan Belajar ${item.kb}`;
  qText.textContent = item.q;
  optionsContainer.innerHTML = '';
  explainBox.classList.remove('show');
  explainBox.innerHTML = '';
  nextBtn.classList.remove('show');
  nextBtn.textContent = current === questions.length - 1 ? 'Lihat Hasil →' : 'Lanjut →';

  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="tag">${String.fromCharCode(65+idx)}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(idx, btn));
    optionsContainer.appendChild(btn);
  });

  refreshProgress();
}

function selectOption(idx, btnEl){
  if(locked) return;
  locked = true;
  const item = questions[current];
  const allBtns = optionsContainer.querySelectorAll('.option');
  allBtns.forEach(b => b.classList.add('locked'));

  if(idx === item.correct){
    btnEl.classList.add('correct');
    answers[current] = 'correct';
    score++;
  } else {
    btnEl.classList.add('wrong');
    allBtns[item.correct].classList.add('correct');
    answers[current] = 'wrong';
  }

  explainBox.innerHTML = `<strong>${idx === item.correct ? 'Benar.' : 'Kurang tepat.'}</strong> ${item.explain}`;
  explainBox.classList.add('show');
  nextBtn.classList.add('show');
  refreshProgress();
}

nextBtn.addEventListener('click', () => {
  if(current < questions.length - 1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult(){
  quizCard.style.display = 'none';
  resultCard.classList.add('show');

  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('finalPercent').textContent = `${pct}% jawaban benar`;

  let kb1 = 0, kb2 = 0;
  questions.forEach((q, i) => {
    if(answers[i] === 'correct'){
      if(q.kb === 1) kb1++; else kb2++;
    }
  });
  document.getElementById('kb1Score').textContent = `${kb1}/10`;
  document.getElementById('kb2Score').textContent = `${kb2}/10`;

  let title, desc;
  if(score >= 18){
    title = 'Pakar Konsumen Digital';
    desc = 'Luar biasa! Analisis Anda mengenai perilaku dan strategi pendekatan konsumen digital sangat akurat.';
  } else if(score >= 14){
    title = 'Ahli Pemasaran Potensial';
    desc = 'Sangat baik. Anda sudah memahami pola pikir konsumen modern, hanya perlu sedikit ulasan tambahan.';
  } else if(score >= 10){
    title = 'Perlu Penyesuaian Strategi';
    desc = 'Pemahaman Anda masih terpaku pada beberapa pola pikir konvensional. Coba pelajari ulang kerangka 5A Kotler.';
  } else {
    title = 'Mulai dari Dasar';
    desc = 'Masih banyak ruang untuk belajar. Silakan baca kembali Modul 5 secara komprehensif sebelum mencoba lagi.';
  }
  document.getElementById('verdictTitle').textContent = title;
  document.getElementById('verdictDesc').textContent = desc;
}

document.getElementById('retryBtn').addEventListener('click', () => {
  current = 0; score = 0; answers.fill(null);
  resultCard.classList.remove('show');
  quizCard.style.display = 'block';
  renderQuestion();
});

buildProgress();
renderQuestion();
</script>
</body>
</html>
